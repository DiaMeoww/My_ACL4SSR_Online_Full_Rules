name: Auto Clean and Sync Rules

on:
  schedule:
    - cron: "30 22 * * *"     # 每天北京时间 06:30 执行
  workflow_dispatch: 
  push:
    paths:
      - '.github/workflows/clean_rules.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch, Compare and Clean Google Rules
        run: |
          python3 - <<'PY'
          import urllib.request
          from pathlib import Path

          url = "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/QuantumultX/Google/Google.list"
          youtube_keywords = ["youtube", "googlevideo", "ytimg", "ggpht", "youtube-nocookie"]
          
          # 1. 确保目标目录存在
          Path("rules/BlackMatrix7").mkdir(parents=True, exist_ok=True)
          Path("rules/mini").mkdir(parents=True, exist_ok=True)

          # 2. 下载最新的官方原版
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  raw_content = response.read().decode('utf-8')
          except Exception as e:
              print(f"Error fetching rules: {e}")
              raise SystemExit(1)

          # 3. 对比原版是否变动
          upstream_path = Path("rules/BlackMatrix7/Google.list")
          if upstream_path.exists():
              old_content = upstream_path.read_text(encoding="utf-8")
              if old_content.strip() == raw_content.strip():
                  print("No changes in upstream BlackMatrix7 Google.list. Exiting.")
                  raise SystemExit(0)

          # 4. 如果发生变动，保存最新的原版
          upstream_path.write_text(raw_content, encoding="utf-8")

          # 5. 执行后续深度清洗逻辑，生成 mini/Google.list
          from collections import Counter
          valid_entries = []
          all_main_domains = []

          for line in raw_content.splitlines():
              line_clean = line.strip()
              if not line_clean or line_clean.startswith("#") or line_clean.startswith(";"):
                  continue
              parts = line_clean.split(",")
              if len(parts) < 2:
                  continue
              
              rule_type = parts[0].strip().upper()
              # 仅保留域名匹配规则 (HOST, HOST-SUFFIX, HOST-KEYWORD)
              if rule_type not in ["HOST", "HOST-SUFFIX", "HOST-KEYWORD"]:
                  continue
                  
              domain = parts[1].strip().lower()
              
              # 排除含有油管关键字的冲突域名
              if any(kw in domain for kw in youtube_keywords):
                  continue
                  
              # 提取主域名 (如 baselinestudy.org -> baselinestudy)
              sub_parts = domain.split(".")
              if len(sub_parts) >= 3 and sub_parts[-2] in ["com", "co", "net", "org", "gov", "edu"]:
                  main_dom = sub_parts[-3]
              elif len(sub_parts) >= 2:
                  main_dom = sub_parts[-2]
              else:
                  main_dom = domain
                  
              valid_entries.append((line_clean, domain, main_dom))
              all_main_domains.append(main_dom)

          # 统计主域名频次，频次 >= 2 的提炼为 KEYWORD
          main_dom_counts = Counter(all_main_domains)
          auto_keywords = {dom for dom, count in main_dom_counts.items() if count >= 2 and len(dom) > 2}
          must_keywords = {"google", "gmail", "chrome", "chromium", "android", "admob", "adsense", "adwords", "doubleclick", "firebase", "flutter", "gvt"}
          all_keywords = auto_keywords.union(must_keywords)

          cleaned_rules = [
              "# NAME: Google Clean Mini",
              "# AUTHOR: blackmatrix7 & Antigravity Clean Bot",
              "# REPO: https://github.com/DiaMeoww/My_ACL4SSR_Online_Full_Rules",
              "# DESCRIPTION: Highly optimized mini Google ruleset (Keyword merged).",
              ""
          ]
          seen = set()

          # 置顶写入所有的关键字大招
          for kw in sorted(list(all_keywords)):
              cleaned_rules.append(f"HOST-KEYWORD,{kw},Google")
              seen.add(kw)

          # 保存其余的非关键字匹配域名
          for line_raw, domain, main_dom in valid_entries:
              if any(kw in domain for kw in all_keywords):
                  continue
                  
              # 排除小国家 blogspot 后缀
              if "blogspot" in domain and not domain.endswith("blogspot.com"):
                  continue
                  
              parts = line_raw.split(",")
              rule_type = parts[0].strip()
              policy = parts[2].strip() if len(parts) >= 3 else "Google"
              rule_entry = f"{rule_type},{domain},{policy}"
              if rule_entry not in seen:
                  seen.add(rule_entry)
                  cleaned_rules.append(rule_entry)

          Path("rules/mini/Google.list").write_text("\n".join(cleaned_rules) + "\n", encoding="utf-8")
          print(f"Upstream updated! Cleaned Google rules compiled into rules/mini/Google.list. Total non-keyword entries: {len(seen) - 2}")
          PY

      - name: Git Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add rules/BlackMatrix7/Google.list rules/mini/Google.list
          if [ -f "rules/google_clean.list" ]; then
            git rm -f rules/google_clean.list || true
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update upstream and compile mini Google ruleset $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') 喵~"
            git push
          fi
