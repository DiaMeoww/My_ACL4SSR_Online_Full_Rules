name: Auto Clean and Sync Rules

on:
  schedule:
    - cron: "30 22 * * *"     # 每天北京时间 06:30 执行
  workflow_dispatch: 
  push:
    paths:
      - '.github/workflows/clean_rules.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch and Clean Google Rules
        run: |
          mkdir -p rules
          python3 - <<'PY'
          import urllib.request
          from pathlib import Path

          url = "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Google/Google.list"
          youtube_keywords = ["youtube", "googlevideo", "ytimg", "ggpht", "youtube-nocookie"]
          
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  raw_content = response.read().decode('utf-8')
          except Exception as e:
              print(f"Error fetching rules: {e}")
              raise SystemExit(1)

          cleaned_rules = [
              "# NAME: Google Clean (No YouTube Conflict)",
              "# AUTHOR: blackmatrix7 & Antigravity Clean Bot",
              "# REPO: https://github.com/DiaMeoww/My_ACL4SSR_Online_Full_Rules",
              "# DESCRIPTION: Auto-cleaned and deduplicated Google ruleset.",
              ""
          ]
          seen = set()

          for line in raw_content.splitlines():
              line_clean = line.strip()
              if not line_clean or line_clean.startswith("#") or line_clean.startswith(";"):
                  continue
              
              parts = line_clean.split(",")
              if len(parts) < 2:
                  continue
              
              domain = parts[1].strip().lower()
              
              # 排除含有油管关键字的冲突域名
              if any(kw in domain for kw in youtube_keywords):
                  continue
                  
              # 排除小国家 blogspot 后缀 (保留 blogspot.com 本身)
              if "blogspot" in domain and not domain.endswith("blogspot.com"):
                  continue
                  
              # 保存规则条目
              rule_entry = f"{parts[0].strip()},{domain},{parts[2].strip()}" if len(parts) >= 3 else f"{parts[0].strip()},{domain}"
              if rule_entry not in seen:
                  seen.add(rule_entry)
                  cleaned_rules.append(rule_entry)

          Path("rules/google_clean.list").write_text("\n".join(cleaned_rules) + "\n", encoding="utf-8")
          print(f"Google Rules Cleaned! Total entries: {len(seen)}")
          PY

      - name: Git Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add rules/google_clean.list
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync and clean Google ruleset $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') 喵~"
            git push
          fi
