name: Auto Clean and Sync Rules

on:
  schedule:
    - cron: "0 22 * * *"     # 每天北京时间 06:00 执行
  workflow_dispatch: 
  push:
    paths:
      - '.github/workflows/clean_rules.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch, Compare and Clean Rules
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import urllib.request
          from pathlib import Path
          import os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "manual")
          
          # 1. 确保目标目录存在
          Path("rules/BlackMatrix7").mkdir(parents=True, exist_ok=True)
          Path("rules/mini").mkdir(parents=True, exist_ok=True)

          # ----------------- 处理 Google -----------------
          google_url = "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list"
          youtube_keywords = ["youtube", "googlevideo", "ytimg", "ggpht", "youtube-nocookie"]
          
          try:
              req = urllib.request.Request(google_url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  google_raw = response.read().decode('utf-8')
          except Exception as e:
              print(f"Error fetching Google rules: {e}")
              raise SystemExit(1)

          google_upstream = Path("rules/BlackMatrix7/Google.list")
          google_mini = Path("rules/mini/Google.list")
          google_changed = True
          if event_name == "schedule" and google_upstream.exists() and google_mini.exists():
              if google_upstream.read_text(encoding="utf-8").strip() == google_raw.strip():
                  google_changed = False
                  print("No changes in upstream Google.list.")

          if google_changed:
              google_upstream.write_text(google_raw, encoding="utf-8")
              google_clean = [
                  "# NAME: Google Clean Mini",
                  "# AUTHOR: blackmatrix7 & Antigravity Clean Bot",
                  "# REPO: https://github.com/DiaMeoww/My_ACL4SSR_Online_Full_Rules/blob/main/rules/mini/Google.list",
                  "",
                  "DOMAIN-KEYWORD,google",
                  "DOMAIN-KEYWORD,gmail",
                  "DOMAIN-KEYWORD,blogspot"
              ]
              google_keywords = ["google", "gmail", "blogspot"]
              
              seen = set()
              for line in google_clean:
                  line_strip = line.strip()
                  if line_strip and not line_strip.startswith("#"):
                      parts = line_strip.split(",")
                      if len(parts) >= 2:
                          seen.add(line_strip.lower())

              for line in google_raw.splitlines():
                  line_clean = line.strip()
                  if not line_clean or line_clean.startswith("#") or line_clean.startswith(";"):
                      continue
                  parts = line_clean.split(",")
                  if len(parts) < 2:
                      continue
                  parts = [p.strip() for p in parts]
                  rule_type = parts[0]
                  domain = parts[1]
                  domain_lower = domain.lower()
                  extra = ",".join(parts[2:]) if len(parts) >= 3 else ""
                  
                  if rule_type.startswith("DOMAIN"):
                      if any(kw in domain_lower for kw in youtube_keywords):
                          continue
                      if any(kw in domain_lower for kw in google_keywords):
                          continue
                          
                  if extra:
                      rule_entry = f"{rule_type},{domain},{extra}"
                  else:
                      rule_entry = f"{rule_type},{domain}"
                  
                  rule_entry_lower = rule_entry.lower()
                  if rule_entry_lower not in seen:
                      seen.add(rule_entry_lower)
                      google_clean.append(rule_entry)
              Path("rules/mini/Google.list").write_text("\n".join(google_clean) + "\n", encoding="utf-8")
              print("Google rules updated and compiled.")

          # ----------------- 处理 Microsoft -----------------
          ms_url = "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list"
          
          try:
              req = urllib.request.Request(ms_url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  ms_raw = response.read().decode('utf-8')
          except Exception as e:
              print(f"Error fetching Microsoft rules: {e}")
              raise SystemExit(1)

          ms_upstream = Path("rules/BlackMatrix7/Microsoft.list")
          ms_mini = Path("rules/mini/Microsoft.list")
          ms_changed = True
          if event_name == "schedule" and ms_upstream.exists() and ms_mini.exists():
              if ms_upstream.read_text(encoding="utf-8").strip() == ms_raw.strip():
                  ms_changed = False
                  print("No changes in upstream Microsoft.list.")

          if ms_changed:
              ms_upstream.write_text(ms_raw, encoding="utf-8")
              ms_clean = [
                  "# NAME: Microsoft Clean Mini",
                  "# AUTHOR: blackmatrix7 & Antigravity Clean Bot",
                  "# REPO: https://github.com/DiaMeoww/My_ACL4SSR_Online_Full_Rules/blob/main/rules/mini/Microsoft.list",
                  "",
                  "DOMAIN-KEYWORD,microsoft",
                  "DOMAIN-KEYWORD,windows",
                  "DOMAIN-SUFFIX,office.com",
                  "DOMAIN-SUFFIX,office.net",
                  "DOMAIN-KEYWORD,outlook",
                  "DOMAIN-SUFFIX,bing.com",
                  "DOMAIN-SUFFIX,bing.net",
                  "DOMAIN-SUFFIX,bing.com.cn",
                  "DOMAIN-KEYWORD,xbox",
                  "DOMAIN-KEYWORD,skype",
                  "DOMAIN-KEYWORD,azure",
                  "DOMAIN-KEYWORD,visualstudio",
                  "DOMAIN-KEYWORD,onedrive",
                  "DOMAIN-KEYWORD,hotmail",
                  "DOMAIN-SUFFIX,live.com",
                  "DOMAIN-SUFFIX,live.net",
                  "DOMAIN-SUFFIX,live.cn",
                  "DOMAIN-KEYWORD,21vbluecloud",
                  "DOMAIN-SUFFIX,msn.com",
                  "DOMAIN-SUFFIX,msn.cn",
                  "DOMAIN-SUFFIX,msn.net"
              ]
              ms_keywords = ["microsoft", "windows", "outlook", "xbox", "skype", "azure", "visualstudio", "onedrive", "hotmail", "21vbluecloud"]
              ms_suffixes = ["msn.com", "msn.cn", "msn.net", "office.com", "office.net", "bing.com", "bing.net", "bing.com.cn", "live.com", "live.net", "live.cn"]
              
              seen = set()
              for line in ms_clean:
                  line_strip = line.strip()
                  if line_strip and not line_strip.startswith("#"):
                      parts = line_strip.split(",")
                      if len(parts) >= 2:
                          seen.add(line_strip.lower())
              
              for line in ms_raw.splitlines():
                  line_clean = line.strip()
                  if not line_clean or line_clean.startswith("#") or line_clean.startswith(";"):
                      continue
                  parts = line_clean.split(",")
                  if len(parts) < 2:
                      continue
                  parts = [p.strip() for p in parts]
                  rule_type = parts[0]
                  domain = parts[1]
                  domain_lower = domain.lower()
                  extra = ",".join(parts[2:]) if len(parts) >= 3 else ""
                  
                  if rule_type.startswith("DOMAIN"):
                      if any(kw in domain_lower for kw in ms_keywords):
                          continue
                      if any(domain_lower == sfx or domain_lower.endswith("." + sfx) for sfx in ms_suffixes):
                          continue
                      
                  if extra:
                      rule_entry = f"{rule_type},{domain},{extra}"
                  else:
                      rule_entry = f"{rule_type},{domain}"
                  
                  rule_entry_lower = rule_entry.lower()
                  if rule_entry_lower not in seen:
                      seen.add(rule_entry_lower)
                      ms_clean.append(rule_entry)
              Path("rules/mini/Microsoft.list").write_text("\n".join(ms_clean) + "\n", encoding="utf-8")
              print("Microsoft rules updated and compiled.")
          
          if not google_changed and not ms_changed:
              print("All rulesets are up-to-date. Exiting workflow.")
              raise SystemExit(0)
          PY

      - name: Git Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add rules/BlackMatrix7/Google.list rules/mini/Google.list rules/BlackMatrix7/Microsoft.list rules/mini/Microsoft.list
          if [ -f "rules/google_clean.list" ]; then
            git rm -f rules/google_clean.list || true
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync and compile mini Google & Microsoft rulesets $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') 喵~"
            git push
          fi
