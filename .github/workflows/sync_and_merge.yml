name: Sync Rules and Merge Config

on:
  schedule:
    - cron: "0 22 * * *"     # 每天北京时间 06:00 执行
  workflow_dispatch: 
  push:
    paths:
      - 'my_rules.ini'
      - '.github/workflows/sync_and_merge.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ==================== 阶段一：同步上游 + 编译 mini 规则 ====================
      - name: Fetch, Compare and Clean Rules
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import urllib.request
          from pathlib import Path
          import os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "manual")
          
          # 1. 确保目标目录存在
          Path("egern/upstream").mkdir(parents=True, exist_ok=True)
          Path("egern/mini").mkdir(parents=True, exist_ok=True)

          # ----------------- 处理 Google -----------------
          google_url = "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list"
          youtube_keywords = ["youtube", "googlevideo", "ytimg", "ggpht", "youtube-nocookie"]
          
          try:
              req = urllib.request.Request(google_url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  google_raw = response.read().decode('utf-8')
          except Exception as e:
              print(f"Error fetching Google rules: {e}")
              raise SystemExit(1)

          google_upstream = Path("egern/upstream/Google.list")
          google_mini = Path("egern/mini/Google.list")
          google_changed = True
          if event_name == "schedule" and google_upstream.exists() and google_mini.exists():
              if google_upstream.read_text(encoding="utf-8").strip() == google_raw.strip():
                  google_changed = False
                  print("No changes in upstream Google.list.")

          if google_changed:
              google_upstream.write_text(google_raw, encoding="utf-8")
              google_clean = [
                  "# NAME: Google Clean Mini",
                  "# AUTHOR: blackmatrix7 & Antigravity Clean Bot",
                  "# REPO: https://github.com/DiaMeoww/My_ACL4SSR_Online_Full_Rules/blob/main/egern/mini/Google.list",
                  "",
                  "DOMAIN-KEYWORD,google",
                  "DOMAIN-KEYWORD,gmail",
                  "DOMAIN-KEYWORD,blogspot"
              ]
              google_keywords = ["google", "gmail", "blogspot"]
              
              seen = set()
              for line in google_clean:
                  line_strip = line.strip()
                  if line_strip and not line_strip.startswith("#"):
                      parts = line_strip.split(",")
                      if len(parts) >= 2:
                          seen.add(line_strip.lower())

              for line in google_raw.splitlines():
                  line_clean = line.strip()
                  if not line_clean or line_clean.startswith("#") or line_clean.startswith(";"):
                      continue
                  parts = line_clean.split(",")
                  if len(parts) < 2:
                      continue
                  parts = [p.strip() for p in parts]
                  rule_type = parts[0]
                  domain = parts[1]
                  domain_lower = domain.lower()
                  extra = ",".join(parts[2:]) if len(parts) >= 3 else ""
                  
                  if rule_type.startswith("DOMAIN"):
                      if any(kw in domain_lower for kw in youtube_keywords):
                          continue
                      if any(kw in domain_lower for kw in google_keywords):
                          continue
                          
                  if extra:
                      rule_entry = f"{rule_type},{domain},{extra}"
                  else:
                      rule_entry = f"{rule_type},{domain}"
                  
                  rule_entry_lower = rule_entry.lower()
                  if rule_entry_lower not in seen:
                      seen.add(rule_entry_lower)
                      google_clean.append(rule_entry)
              Path("egern/mini/Google.list").write_text("\n".join(google_clean) + "\n", encoding="utf-8")
              print("Google rules updated and compiled.")

          # ----------------- 处理 Microsoft -----------------
          ms_url = "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list"
          
          try:
              req = urllib.request.Request(ms_url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  ms_raw = response.read().decode('utf-8')
          except Exception as e:
              print(f"Error fetching Microsoft rules: {e}")
              raise SystemExit(1)

          ms_upstream = Path("egern/upstream/Microsoft.list")
          ms_mini = Path("egern/mini/Microsoft.list")
          ms_changed = True
          if event_name == "schedule" and ms_upstream.exists() and ms_mini.exists():
              if ms_upstream.read_text(encoding="utf-8").strip() == ms_raw.strip():
                  ms_changed = False
                  print("No changes in upstream Microsoft.list.")

          if ms_changed:
              ms_upstream.write_text(ms_raw, encoding="utf-8")
              ms_clean = [
                  "# NAME: Microsoft Clean Mini",
                  "# AUTHOR: blackmatrix7 & Antigravity Clean Bot",
                  "# REPO: https://github.com/DiaMeoww/My_ACL4SSR_Online_Full_Rules/blob/main/egern/mini/Microsoft.list",
                  "",
                  "DOMAIN-KEYWORD,microsoft",
                  "DOMAIN-KEYWORD,windows",
                  "DOMAIN-SUFFIX,office.com",
                  "DOMAIN-SUFFIX,office.net",
                  "DOMAIN-KEYWORD,outlook",
                  "DOMAIN-SUFFIX,bing.com",
                  "DOMAIN-SUFFIX,bing.net",
                  "DOMAIN-SUFFIX,bing.com.cn",
                  "DOMAIN-KEYWORD,xbox",
                  "DOMAIN-KEYWORD,skype",
                  "DOMAIN-KEYWORD,azure",
                  "DOMAIN-KEYWORD,visualstudio",
                  "DOMAIN-KEYWORD,onedrive",
                  "DOMAIN-KEYWORD,hotmail",
                  "DOMAIN-SUFFIX,live.com",
                  "DOMAIN-SUFFIX,live.net",
                  "DOMAIN-SUFFIX,live.cn",
                  "DOMAIN-KEYWORD,21vbluecloud",
                  "DOMAIN-SUFFIX,msn.com",
                  "DOMAIN-SUFFIX,msn.cn",
                  "DOMAIN-SUFFIX,msn.net"
              ]
              ms_keywords = ["microsoft", "windows", "outlook", "xbox", "skype", "azure", "visualstudio", "onedrive", "hotmail", "21vbluecloud"]
              ms_suffixes = ["msn.com", "msn.cn", "msn.net", "office.com", "office.net", "bing.com", "bing.net", "bing.com.cn", "live.com", "live.net", "live.cn"]
              
              seen = set()
              for line in ms_clean:
                  line_strip = line.strip()
                  if line_strip and not line_strip.startswith("#"):
                      parts = line_strip.split(",")
                      if len(parts) >= 2:
                          seen.add(line_strip.lower())
              
              for line in ms_raw.splitlines():
                  line_clean = line.strip()
                  if not line_clean or line_clean.startswith("#") or line_clean.startswith(";"):
                      continue
                  parts = line_clean.split(",")
                  if len(parts) < 2:
                      continue
                  parts = [p.strip() for p in parts]
                  rule_type = parts[0]
                  domain = parts[1]
                  domain_lower = domain.lower()
                  extra = ",".join(parts[2:]) if len(parts) >= 3 else ""
                  
                  if rule_type.startswith("DOMAIN"):
                      if any(kw in domain_lower for kw in ms_keywords):
                          continue
                      if any(domain_lower == sfx or domain_lower.endswith("." + sfx) for sfx in ms_suffixes):
                          continue
                      
                  if extra:
                      rule_entry = f"{rule_type},{domain},{extra}"
                  else:
                      rule_entry = f"{rule_type},{domain}"
                  
                  rule_entry_lower = rule_entry.lower()
                  if rule_entry_lower not in seen:
                      seen.add(rule_entry_lower)
                      ms_clean.append(rule_entry)
              Path("egern/mini/Microsoft.list").write_text("\n".join(ms_clean) + "\n", encoding="utf-8")
              print("Microsoft rules updated and compiled.")
          
          if not google_changed and not ms_changed:
              print("All rulesets are up-to-date.")
          PY

      # ==================== 阶段二：合并 ACL4SSR 配置 ====================
      - name: Download Remote Rule
        run: |
          curl -fsSL "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini" -o acl4ssr.ini

      - name: Merge ACL4SSR Config
        run: |
          # 1. 直接把主人的 my_rules.ini 作为基础文件（保留所有 [rule] [custom] 标签）
          if [ -f "my_rules.ini" ]; then
            cat my_rules.ini > ACL4SSR_Custom.ini
            echo -e "" >> ACL4SSR_Custom.ini
          else
            touch ACL4SSR_Custom.ini
          fi
          
          # 2. 拼接原始 ACL4SSR 规则区，并插入自定义分组
          echo "; --- 原始 ACL4SSR 规则区 ---" >> ACL4SSR_Custom.ini
          if [ -f "acl4ssr.ini" ]; then
            python3 - <<'PY'
          from pathlib import Path

          source = Path("acl4ssr.ini")
          target = Path("ACL4SSR_Custom.ini")
          insertions = [
              {
                  "label": "Google Ruleset",
                  "anchor": "ruleset=💬 Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list",
                  "groups": [
                      "ruleset=🔍 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list",
                  ],
              },
              {
                  "label": "Telegram",
                  "anchor": "custom_proxy_group=📲 电报消息`select`",
                  "groups": [
                      "custom_proxy_group=📄 Twitter`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT",
                      "custom_proxy_group=⚡️ 交易平台`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT",
                  ],
              },
              {
                  "label": "Google",
                  "anchor": "custom_proxy_group=💬 Ai平台`select`",
                  "groups": [
                      "custom_proxy_group=🔍 Google`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT",
                      "custom_proxy_group=👾 除港国际`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT",
                  ],
              },
              {
                  "label": "Netflix",
                  "anchor": "custom_proxy_group=🎥 奈飞视频`select`",
                  "groups": [
                      "custom_proxy_group=🎬 Emby`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT",
                  ],
              },
          ]
          inserted = {item["label"]: False for item in insertions}

          with source.open("r", encoding="utf-8") as src, target.open("a", encoding="utf-8", newline="\n") as out:
              for line in src:
                  out.write(line)
                  for item in insertions:
                      label = item["label"]
                      if inserted[label] or not line.startswith(item["anchor"]):
                          continue
                      if not line.endswith("\n"):
                          out.write("\n")
                      for group in item["groups"]:
                          out.write(group + "\n")
                      inserted[label] = True

          missing = [label for label, was_inserted in inserted.items() if not was_inserted]
          if missing:
              raise SystemExit("Custom proxy group anchor was not found: " + ", ".join(missing))
          PY
          fi

      # ==================== 阶段三：统一推送 ====================
      - name: Git Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add egern/upstream/Google.list egern/mini/Google.list egern/upstream/Microsoft.list egern/mini/Microsoft.list ACL4SSR_Custom.ini
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync and merge rules $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') 喵~"
            git push
          fi
