name: Sync and Merge Rules

on:
  schedule:
    - cron: '0 20 * * *' 
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download Remote Rule
        run: |
          # 下载原始的 ACL4SSR 配置文件喵
          curl -sSL "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini" -o acl4ssr.ini

      - name: Simple Merge Rules
        run: |
          # 1. 创建合并文件，先写好唯一的 [custom] 开头喵
          echo "[custom]" > merged_config.ini
          echo "; --- 主人的自定义规则区 ---" >> merged_config.ini
          
          # 2. 把主人的 my_rules.ini 内容直接倒进去
          # 用 sed 删掉主人文件里可能存在的 [custom] 标签，防止重复喵
          if [ -f "my_rules.ini" ]; then
            sed '/^\[custom\]/d' my_rules.ini >> merged_config.ini
          fi
          
          echo -e "\n; --- 原始 ACL4SSR 规则区 ---" >> merged_config.ini
          
          # 3. 把下载回来的 rules 塞进去，同样删掉它的 [custom] 标签喵
          sed '/^\[custom\]/d' acl4ssr.ini >> merged_config.ini

      - name: Git Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add merged_config.ini
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update merged rules $(date +'%Y-%m-%d %H:%M') 喵~"
            git push
          fi
