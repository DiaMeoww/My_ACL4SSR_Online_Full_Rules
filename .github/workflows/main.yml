name: Sync and Merge Rules

on:
  # schedule:
  #   - cron: '0 0 * * *' 
  workflow_dispatch: 
  push:
    paths:
      - 'my_rules.ini'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download Remote Rule
        run: |
          curl -sSL "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini" -o acl4ssr.ini

      - name: Simple Merge Rules
        run: |
          # 1. 直接把主人的 my_rules.ini 作为基础文件（保留所有 [rule] [custom] 标签）
          if [ -f "my_rules.ini" ]; then
            cat my_rules.ini > merged_config.ini
            echo -e "" >> merged_config.ini
          else
            touch merged_config.ini
          fi
          
          # 2. 拼接原始 ACL4SSR 规则区
          echo "; --- 原始 ACL4SSR 规则区 ---" >> merged_config.ini
          if [ -f "acl4ssr.ini" ]; then
            cat acl4ssr.ini >> merged_config.ini
          fi


      - name: Git Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add merged_config.ini
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update merged rules $(date +'%Y-%m-%d %H:%M') 喵~"
            git push
          fi
