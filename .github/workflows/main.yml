name: Sync and Merge Rules

on:
  schedule:
    - cron: "0 22 * * *"     # 每天北京时间 06:00 执行
  workflow_dispatch: 
  push:
    paths:
      - 'my_rules.ini'
      - '.github/workflows/main.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download Remote Rule
        run: |
          curl -sSL "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini" -o acl4ssr.ini

      - name: Simple Merge Rules
        run: |
          # 1. 直接把主人的 my_rules.ini 作为基础文件（保留所有 [rule] [custom] 标签）
          if [ -f "my_rules.ini" ]; then
            cat my_rules.ini > merged_config.ini
            echo -e "" >> merged_config.ini
          else
            touch merged_config.ini
          fi
          
          # 2. 拼接原始 ACL4SSR 规则区，并插入自定义分组
          echo "; --- 原始 ACL4SSR 规则区 ---" >> merged_config.ini
          if [ -f "acl4ssr.ini" ]; then
            python3 - <<'PY'
          from pathlib import Path

          source = Path("acl4ssr.ini")
          target = Path("merged_config.ini")
          ai_anchor = "custom_proxy_group=💬 Ai平台`select`"
          ai_group = "custom_proxy_group=👾 除港国际`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT"
          bilibili_anchor = "custom_proxy_group=📺 哔哩哔哩`select`"
          emby_group = "custom_proxy_group=🎬 Emby`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT"

          inserted_ai = False
          inserted_emby = False
          with source.open("r", encoding="utf-8") as src, target.open("a", encoding="utf-8", newline="\n") as out:
              for line in src:
                  out.write(line)
                  if not inserted_ai and line.startswith(ai_anchor):
                      if not line.endswith("\n"):
                          out.write("\n")
                      out.write(ai_group + "\n")
                      inserted_ai = True
                  if not inserted_emby and line.startswith(bilibili_anchor):
                      if not line.endswith("\n"):
                          out.write("\n")
                      out.write(emby_group + "\n")
                      inserted_emby = True

          missing = []
          if not inserted_ai:
              missing.append("Ai platform")
          if not inserted_emby:
              missing.append("Bilibili")
          if missing:
              raise SystemExit("Custom proxy group anchor was not found: " + ", ".join(missing))
          PY
          fi


      - name: Git Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add merged_config.ini
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update merged rules $(date +'%Y-%m-%d %H:%M') 喵~"
            git push
          fi
