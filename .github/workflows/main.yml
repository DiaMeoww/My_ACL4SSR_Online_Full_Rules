name: Sync and Merge Rules

on:
  schedule:
    - cron: '0 20 * * *' 
  workflow_dispatch: 

# 加入这个全局环境变量，提前拥抱 Node.js 24 喵！
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Remote Rule
        run: |
          curl -sSL "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini" -o acl4ssr.ini

      - name: Merge Rules
        run: |
          touch my_rules.ini
          cat my_rules.ini > merged_config.ini
          echo -e "\n" >> merged_config.ini
          cat acl4ssr.ini >> merged_config.ini

      - name: Git Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add merged_config.ini
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update merged rules $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
